<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptability Prediction</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Adaptability Prediction System</h1>
        <form action="/predict" method="post">
            <label for="institution_type">Institution Type:</label>
            <select name="institution_type" id="institution_type" required>
                <option value="0">Public</option>
                <option value="1">Private</option>
            </select>

            <label for="load_shedding">Load-shedding (Hours per day):</label>
            <input type="number" step="0.01" name="load_shedding" id="load_shedding" required>

            <label for="gender">Gender:</label>
            <select name="gender" id="gender" required>
                <option value="0">Male</option>
                <option value="1">Female</option>
            </select>

            <label for="it_student">IT Student:</label>
            <select name="it_student" id="it_student" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <label for="age">Age:</label>
            <input type="number" name="age" id="age" required>

            <label for="network_type">Network Type:</label>
            <select name="network_type" id="network_type" required>
                <option value="0">2G</option>
                <option value="1">3G</option>
                <option value="2">4G</option>
            </select>

            <label for="self_lms">Self LMS Usage:</label>
            <select name="self_lms" id="self_lms" required>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>

            <label for="financial_condition">Financial Condition (1-10):</label>
            <input type="number" name="financial_condition" id="financial_condition" min="1" max="10" required>

            <label for="class_duration">Class Duration (Hours):</label>
            <input type="number" step="0.01" name="class_duration" id="class_duration" required>

            <label for="education_level">Education Level:</label>
            <select name="education_level" id="education_level" required>
                <option value="0">School</option>
                <option value="1">College</option>
                <option value="2">University</option>
            </select>

            <label for="device">Device Type:</label>
            <select name="device" id="device" required>
                <option value="0">Mobile</option>
                <option value="1">Laptop</option>
                <option value="2">Desktop</option>
            </select>

            <label for="internet_type">Internet Type:</label>
            <select name="internet_type" id="internet_type" required>
                <option value="0">WiFi</option>
                <option value="1">Mobile Data</option>
            </select>

            <label for="location">Location:</label>
            <select name="location" id="location" required>
                <option value="0">Urban</option>
                <option value="1">Rural</option>
            </select>

            <button type="submit">Predict Adaptability</button>
        </form>
    </div>
</body>
</html>
